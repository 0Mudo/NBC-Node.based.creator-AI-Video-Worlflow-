<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob: nbc: http: https: ws: wss:; img-src 'self' data: blob: nbc: http: https:; media-src 'self' data: blob: nbc: http: https:;" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Node-Based Creator</title>
  </head>
  <body class="bg-bg-primary text-text-primary">
    <div id="error-log" style="position: absolute; top: 0; left: 0; background: rgba(0,0,0,0.8); color: red; z-index: 9999; padding: 20px; display: none; white-space: pre-wrap; width: 100vw; height: 100vh; overflow: auto;"></div>
    <script>
      window.addEventListener('error', (event) => {
        const log = document.getElementById('error-log');
        log.style.display = 'block';
        log.textContent += event.error ? event.error.stack : event.message + '\n';
      });
      window.addEventListener('unhandledrejection', (event) => {
        const log = document.getElementById('error-log');
        log.style.display = 'block';
        log.textContent += (event.reason ? (event.reason.stack || event.reason) : 'Unhandled Rejection') + '\n';
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
