<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NBC Logo — Node-Based Creator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  :root {
    --bg-deep: #06060c;
    --bg-surface: #0d0d18;
    --accent: #00e5ff;
    --accent-glow: rgba(0,229,255,0.35);
    --accent-dim: rgba(0,229,255,0.12);
    --text-primary: #f0f0f5;
    --text-secondary: rgba(240,240,245,0.55);
    --stroke: rgba(255,255,255,0.08);
    --node-fill: #141420;
  }

  html { scroll-behavior: smooth; background: var(--bg-deep); }
  body {
    font-family: 'Space Grotesk', 'Noto Sans SC', system-ui, sans-serif;
    background: var(--bg-deep);
    color: var(--text-primary);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Noise texture overlay ── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 9999;
    pointer-events: none;
    opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  /* ── Grid background ── */
  .grid-bg {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 64px 64px;
    mask-image: radial-gradient(ellipse 70% 70% at 50% 40%, black 30%, transparent 70%);
  }

  /* ── Hero Section ── */
  .hero {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 2rem;
  }

  .logo-lockup {
    display: flex; flex-direction: column;
    align-items: center; gap: 2rem;
    animation: lockupEnter 1.2s cubic-bezier(0.22, 0.61, 0.36, 1) both;
  }

  @keyframes lockupEnter {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── SVG Logo Mark ── */
  .logo-mark-container {
    position: relative;
    width: 180px; height: 180px;
    display: flex; align-items: center; justify-content: center;
  }

  .logo-mark-container svg {
    width: 100%; height: 100%;
  }

  /* Node entrance animations */
  .node-main {
    animation: nodeEnter 0.8s cubic-bezier(0.22, 0.61, 0.36, 1) both;
  }
  .node-main:nth-child(1) { animation-delay: 0.1s; }
  .node-main:nth-child(2) { animation-delay: 0.25s; }
  .node-main:nth-child(3) { animation-delay: 0.4s; }

  @keyframes nodeEnter {
    from { opacity: 0; transform: scale(0.3); }
    to   { opacity: 1; transform: scale(1); }
  }

  .conn-line {
    stroke-dasharray: 200;
    stroke-dashoffset: 200;
    animation: lineDraw 1s 0.5s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
  }
  .conn-line:nth-child(4) { animation-delay: 0.55s; }
  .conn-line:nth-child(5) { animation-delay: 0.6s; }
  .conn-line:nth-child(6) { animation-delay: 0.65s; }

  @keyframes lineDraw {
    to { stroke-dashoffset: 0; }
  }

  .core-diamond {
    animation: corePulse 3s ease-in-out infinite;
  }
  @keyframes corePulse {
    0%, 100% { opacity: 0.7; transform: scale(1); }
    50%      { opacity: 1;   transform: scale(1.08); }
  }

  /* Outer orbital ring */
  .orbital-ring {
    animation: orbitSpin 20s linear infinite;
    transform-origin: center;
  }
  @keyframes orbitSpin {
    to { transform: rotate(360deg); }
  }

  .satellite {
    animation: satelliteBlink 2.5s ease-in-out infinite;
  }
  .satellite:nth-child(8)  { animation-delay: 0s; }
  .satellite:nth-child(9)  { animation-delay: 0.8s; }
  .satellite:nth-child(10) { animation-delay: 1.6s; }

  @keyframes satelliteBlink {
    0%, 100% { opacity: 0.3; }
    50%      { opacity: 0.9; }
  }

  /* Glow aura */
  .glow-aura {
    animation: auraBreath 4s ease-in-out infinite;
  }
  @keyframes auraBreath {
    0%, 100% { opacity: 0.25; r: 38; }
    50%      { opacity: 0.5;  r: 44; }
  }

  /* ── Wordmark ── */
  .wordmark {
    display: flex; flex-direction: column;
    align-items: center; gap: 0.5rem;
    animation: wordEnter 1s 0.65s cubic-bezier(0.22, 0.61, 0.36, 1) both;
  }
  @keyframes wordEnter {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .wordmark .nbc-text {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 4.5rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    line-height: 1;
    background: linear-gradient(180deg, #ffffff 0%, #c8d6e5 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .wordmark .subtitle {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 1.05rem;
    font-weight: 400;
    letter-spacing: 0.18em;
    color: var(--text-secondary);
    text-transform: uppercase;
  }

  .wordmark .divider {
    width: 48px; height: 2px;
    background: var(--accent);
    border-radius: 1px;
    opacity: 0.7;
  }

  /* ── Logo Variations Section ── */
  .variations {
    position: relative; z-index: 1;
    padding: 6rem 2rem;
    max-width: 1100px; margin: 0 auto;
  }

  .section-label {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 2.5rem;
    opacity: 0.8;
  }

  .variants-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 1.5rem;
  }

  .variant-card {
    background: var(--bg-surface);
    border: 1px solid var(--stroke);
    border-radius: 16px;
    padding: 2.5rem 2rem;
    display: flex; flex-direction: column;
    align-items: center; gap: 1.25rem;
    transition: border-color 0.35s ease, transform 0.35s ease;
    position: relative; overflow: hidden;
  }

  .variant-card::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, var(--accent-dim) 0%, transparent 70%);
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  .variant-card:hover {
    border-color: rgba(0,229,255,0.25);
    transform: translateY(-2px);
  }
  .variant-card:hover::before {
    opacity: 1;
  }

  .variant-card > * { position: relative; z-index: 1; }

  .variant-card .variant-label {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-secondary);
  }

  .variant-card svg {
    width: 120px; height: 120px;
  }

  /* ── Color System Section ── */
  .colors {
    position: relative; z-index: 1;
    padding: 4rem 2rem 6rem;
    max-width: 1100px; margin: 0 auto;
  }

  .color-swatches {
    display: flex; gap: 1rem;
    flex-wrap: wrap;
  }

  .swatch {
    flex: 1; min-width: 140px;
    display: flex; flex-direction: column; gap: 0.75rem;
  }

  .swatch .chip {
    width: 100%; aspect-ratio: 1.6;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.06);
    transition: transform 0.3s ease;
  }
  .swatch:hover .chip { transform: scale(1.03); }

  .swatch .color-name {
    font-size: 0.75rem; font-weight: 600;
    letter-spacing: 0.06em;
    color: var(--text-primary);
  }
  .swatch .color-hex {
    font-size: 0.7rem; font-weight: 400;
    color: var(--text-secondary);
    font-family: 'Space Grotesk', monospace;
  }

  /* ── Context Preview ── */
  .context {
    position: relative; z-index: 1;
    padding: 4rem 2rem 8rem;
    max-width: 1100px; margin: 0 auto;
  }

  .app-bar-preview {
    background: rgba(13,13,24,0.8);
    backdrop-filter: blur(20px);
    border: 1px solid var(--stroke);
    border-radius: 20px;
    padding: 1.25rem 2rem;
    display: flex; align-items: center; gap: 1.5rem;
    margin-bottom: 1.5rem;
    transition: border-color 0.35s ease;
  }
  .app-bar-preview:hover {
    border-color: rgba(0,229,255,0.2);
  }

  .app-bar-preview .nav-logo {
    display: flex; align-items: center; gap: 0.75rem;
  }
  .app-bar-preview .nav-logo svg { width: 32px; height: 32px; }
  .app-bar-preview .nav-logo .nav-brand {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700; font-size: 1.1rem;
    letter-spacing: 0.06em;
    color: var(--text-primary);
  }

  .app-bar-preview .nav-items {
    display: flex; gap: 2rem;
    margin-left: auto;
    font-size: 0.8rem; font-weight: 500;
    color: var(--text-secondary);
    letter-spacing: 0.04em;
  }
  .app-bar-preview .nav-items span:hover {
    color: var(--text-primary);
    cursor: pointer;
  }

  .splash-preview {
    background: var(--bg-surface);
    border: 1px solid var(--stroke);
    border-radius: 20px;
    padding: 4rem 2rem;
    display: flex; flex-direction: column;
    align-items: center; gap: 1.5rem;
    text-align: center;
    transition: border-color 0.35s ease;
  }
  .splash-preview:hover {
    border-color: rgba(0,229,255,0.15);
  }
  .splash-preview svg { width: 64px; height: 64px; }
  .splash-preview .splash-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.5rem; font-weight: 700;
    letter-spacing: 0.06em;
  }
  .splash-preview .splash-sub {
    font-size: 0.85rem; color: var(--text-secondary);
    max-width: 360px; line-height: 1.6;
  }

  /* ── Scroll reveal ── */
  .reveal {
    opacity: 0; transform: translateY(40px);
    transition: opacity 0.8s cubic-bezier(0.22, 0.61, 0.36, 1),
                transform 0.8s cubic-bezier(0.22, 0.61, 0.36, 1);
  }
  .reveal.visible { opacity: 1; transform: translateY(0); }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    .wordmark .nbc-text { font-size: 3rem; }
    .wordmark .subtitle { font-size: 0.85rem; letter-spacing: 0.12em; }
    .logo-mark-container { width: 140px; height: 140px; }
    .variants-grid { grid-template-columns: 1fr; }
    .color-swatches { flex-direction: column; }
    .app-bar-preview { flex-direction: column; gap: 1rem; padding: 1.25rem; }
    .app-bar-preview .nav-items { margin-left: 0; gap: 1.25rem; }
  }
</style>
</head>
<body>

<div class="grid-bg"></div>

<!-- ═══════════ HERO ═══════════ -->
<section class="hero">
  <div class="logo-lockup">

    <!-- Logo Mark: Tri-Node Constellation -->
    <div class="logo-mark-container">
      <svg viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">

        <defs>
          <!-- Accent gradient for core -->
          <radialGradient id="coreGlow" cx="50%" cy="45%" r="50%">
            <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.9"/>
            <stop offset="50%" stop-color="#00b8d4" stop-opacity="0.5"/>
            <stop offset="100%" stop-color="#006064" stop-opacity="0"/>
          </radialGradient>

          <!-- Node gradient -->
          <radialGradient id="nodeGrad" cx="40%" cy="35%" r="60%">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
            <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
          </radialGradient>

          <!-- Accent node gradient -->
          <radialGradient id="nodeAccent" cx="40%" cy="35%" r="60%">
            <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.25"/>
            <stop offset="100%" stop-color="#00e5ff" stop-opacity="0.04"/>
          </radialGradient>

          <filter id="glowFilter" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>

          <filter id="softGlow" x="-100%" y="-100%" width="300%" height="300%">
            <feGaussianBlur stdDeviation="8" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>

        <!-- Orbital ring -->
        <circle class="orbital-ring" cx="90" cy="85" r="62" fill="none"
                stroke="rgba(255,255,255,0.04)" stroke-width="0.5"
                stroke-dasharray="8 120" />

        <!-- Aura glow behind core -->
        <circle class="glow-aura" cx="90" cy="82" r="40" fill="url(#coreGlow)" opacity="0.3"/>

        <!-- Connection lines (triangle) -->
        <line class="conn-line" x1="55" y1="50" x2="125" y2="50"
              stroke="rgba(255,255,255,0.12)" stroke-width="1.2"/>
        <line class="conn-line" x1="125" y1="50" x2="90" y2="110"
              stroke="rgba(255,255,255,0.12)" stroke-width="1.2"/>
        <line class="conn-line" x1="90" y1="110" x2="55" y2="50"
              stroke="rgba(255,255,255,0.12)" stroke-width="1.2"/>

        <!-- Connection lines to center -->
        <line class="conn-line" x1="55" y1="50" x2="90" y2="82"
              stroke="rgba(0,229,255,0.15)" stroke-width="0.8" stroke-dasharray="60"/>
        <line class="conn-line" x1="125" y1="50" x2="90" y2="82"
              stroke="rgba(0,229,255,0.15)" stroke-width="0.8" stroke-dasharray="60"/>
        <line class="conn-line" x1="90" y1="110" x2="90" y2="82"
              stroke="rgba(0,229,255,0.15)" stroke-width="0.8" stroke-dasharray="60"/>

        <!-- Nodes: Top-Left (N) -->
        <g class="node-main">
          <circle cx="55" cy="50" r="14" fill="url(#nodeGrad)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
          <circle cx="55" cy="50" r="5" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.25)" stroke-width="0.8"/>
          <circle cx="55" cy="50" r="2" fill="rgba(255,255,255,0.6)"/>
        </g>

        <!-- Nodes: Top-Right (B) -->
        <g class="node-main">
          <circle cx="125" cy="50" r="16" fill="url(#nodeGrad)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
          <circle cx="125" cy="50" r="6" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.25)" stroke-width="0.8"/>
          <circle cx="125" cy="50" r="2.5" fill="rgba(255,255,255,0.6)"/>
        </g>

        <!-- Nodes: Bottom (C) -->
        <g class="node-main">
          <circle cx="90" cy="110" r="15" fill="url(#nodeGrad)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
          <circle cx="90" cy="110" r="5.5" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.25)" stroke-width="0.8"/>
          <circle cx="90" cy="110" r="2.2" fill="rgba(255,255,255,0.6)"/>
        </g>

        <!-- Core diamond (the hub) -->
        <g class="core-diamond" filter="url(#glowFilter)">
          <polygon points="90,74 98,82 90,90 82,82"
                   fill="rgba(0,229,255,0.2)" stroke="#00e5ff" stroke-width="1.2"/>
          <circle cx="90" cy="82" r="3" fill="#00e5ff" opacity="0.9"/>
        </g>

        <!-- Satellite nodes on orbital -->
        <circle class="satellite" cx="90" cy="23" r="2.5" fill="rgba(255,255,255,0.4)"/>
        <circle class="satellite" cx="152" cy="85" r="2" fill="rgba(255,255,255,0.3)"/>
        <circle class="satellite" cx="28" cy="85" r="2.2" fill="rgba(255,255,255,0.35)"/>

        <!-- Tiny dust particles -->
        <circle cx="45" cy="72" r="1" fill="rgba(0,229,255,0.2)">
          <animate attributeName="opacity" values="0.1;0.5;0.1" dur="3s" repeatCount="indefinite"/>
        </circle>
        <circle cx="135" cy="78" r="1" fill="rgba(0,229,255,0.2)">
          <animate attributeName="opacity" values="0.5;0.1;0.5" dur="2.8s" repeatCount="indefinite"/>
        </circle>
        <circle cx="80" cy="60" r="0.8" fill="rgba(0,229,255,0.15)">
          <animate attributeName="opacity" values="0.2;0.7;0.2" dur="4s" repeatCount="indefinite"/>
        </circle>
      </svg>
    </div>

    <!-- Wordmark -->
    <div class="wordmark">
      <span class="nbc-text">NBC</span>
      <div class="divider"></div>
      <span class="subtitle">节点式素材创作器</span>
    </div>

  </div>
</section>

<!-- ═══════════ VARIATIONS ═══════════ -->
<section class="variations reveal">
  <div class="section-label">Logo Variants</div>
  <div class="variants-grid">

    <!-- Full Lockup -->
    <div class="variant-card">
      <span class="variant-label">Full Lockup</span>
      <svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="60" cy="45" r="28" fill="url(#nodeGrad)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
        <circle cx="60" cy="45" r="10" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.8"/>
        <circle cx="60" cy="45" r="4" fill="rgba(255,255,255,0.5)"/>
        <polygon points="60,39 66,45 60,51 54,45" fill="rgba(0,229,255,0.25)" stroke="#00e5ff" stroke-width="1"/>
        <line x1="4" y1="45" x2="32" y2="45" stroke="rgba(255,255,255,0.08)" stroke-width="0.8"/>
        <line x1="88" y1="45" x2="116" y2="45" stroke="rgba(255,255,255,0.08)" stroke-width="0.8"/>
        <line x1="32" y1="45" x2="45" y2="20" stroke="rgba(0,229,255,0.15)" stroke-width="0.6"/>
        <line x1="88" y1="45" x2="75" y2="75" stroke="rgba(0,229,255,0.15)" stroke-width="0.6"/>
        <circle cx="32" cy="45" r="3" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
        <circle cx="88" cy="45" r="3" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
        <circle cx="45" cy="20" r="1.5" fill="rgba(0,229,255,0.3)"/>
        <circle cx="75" cy="75" r="1.5" fill="rgba(0,229,255,0.3)"/>
        <text x="60" y="100" text-anchor="middle" font-family="Space Grotesk" font-weight="700"
              font-size="18" letter-spacing="0.08em" fill="#f0f0f5">NBC</text>
      </svg>
    </div>

    <!-- Mark Only -->
    <div class="variant-card">
      <span class="variant-label">Mark Only</span>
      <svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="60" cy="52" r="36" fill="url(#nodeGrad)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
        <circle cx="60" cy="52" r="28" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="0.5" stroke-dasharray="4 80"/>
        <circle cx="60" cy="52" r="14" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="0.8"/>
        <circle cx="60" cy="52" r="5" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.2)" stroke-width="0.8"/>
        <circle cx="60" cy="52" r="2" fill="rgba(255,255,255,0.5)"/>
        <polygon points="60,45 68,52 60,59 52,52" fill="rgba(0,229,255,0.2)" stroke="#00e5ff" stroke-width="1.2"/>
        <circle cx="60" cy="52" r="2.5" fill="#00e5ff" opacity="0.8"/>
        <!-- Satellites -->
        <line x1="60" y1="16" x2="60" y2="38" stroke="rgba(0,229,255,0.2)" stroke-width="0.6"/>
        <circle cx="60" cy="16" r="2" fill="rgba(255,255,255,0.3)"/>
        <line x1="96" y1="52" x2="74" y2="52" stroke="rgba(0,229,255,0.2)" stroke-width="0.6"/>
        <circle cx="96" cy="52" r="2" fill="rgba(255,255,255,0.3)"/>
        <line x1="24" y1="52" x2="46" y2="52" stroke="rgba(0,229,255,0.2)" stroke-width="0.6"/>
        <circle cx="24" cy="52" r="2" fill="rgba(255,255,255,0.25)"/>
      </svg>
    </div>

    <!-- Monochrome -->
    <div class="variant-card">
      <span class="variant-label">Monochrome</span>
      <svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="60" cy="52" r="32" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
        <circle cx="60" cy="52" r="20" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
        <circle cx="60" cy="52" r="8" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

<!-- ═══════════ SCROLL REVEAL ═══════════ -->
<script>
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.15, rootMargin: '0px 0px -60px 0px' });

  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
</script>
