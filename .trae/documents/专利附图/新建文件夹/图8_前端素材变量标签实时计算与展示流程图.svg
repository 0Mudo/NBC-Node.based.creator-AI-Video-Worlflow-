<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1120" viewBox="0 0 1600 1120">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111"/>
    </marker>
    <style>
      .title { font: 700 28px 'Microsoft YaHei','SimSun',sans-serif; fill:#111; }
      .subtitle { font: 400 16px 'Microsoft YaHei','SimSun',sans-serif; fill:#444; }
      .text { font: 400 16px 'Microsoft YaHei','SimSun',sans-serif; fill:#111; }
      .small { font: 400 13px 'Microsoft YaHei','SimSun',sans-serif; fill:#222; }
      .tiny { font: 400 11px 'Microsoft YaHei','SimSun',sans-serif; fill:#333; }
      .box { fill:#fff; stroke:#111; stroke-width:2; rx:10; ry:10; }
      .group { fill:#fafafa; stroke:#111; stroke-width:2.2; rx:16; ry:16; }
      .panel { fill:#f6f6f6; stroke:#111; stroke-width:2; rx:14; ry:14; }
      .dashed { fill:#fcfcfc; stroke:#111; stroke-width:2; stroke-dasharray:8 6; rx:16; ry:16; }
      .line { stroke:#111; stroke-width:2; fill:none; marker-end:url(#arrow); }
      .plain { stroke:#111; stroke-width:2; fill:none; }
      .soft { fill:#f1f1f1; stroke:#111; stroke-width:1.6; rx:8; ry:8; }
      .chip { fill:#fff; stroke:#111; stroke-width:1.5; rx:12; ry:12; }
    </style>
  </defs>
  
  
  <text x="56" y="54" class="title">图 8  前端素材变量标签实时计算与展示流程图</text>
  
  
  <rect x="400" y="120" width="800" height="80" class="box"/><text x="800" y="148" text-anchor="middle" class="text">AssetInputNode 渲染触发 useMemo</text><text x="800" y="172" text-anchor="middle" class="text">computeRefLabel(id, nodes, edges) 在节点或连线变化时重新计算</text>
  <rect x="400" y="252" width="800" height="88" class="box"/><text x="800" y="280" text-anchor="middle" class="text">遍历所有 Prompt 节点</text><text x="800" y="304" text-anchor="middle" class="text">findUpstream(prompt.id) 判断当前素材节点是否位于其上游</text>
  <rect x="400" y="392" width="800" height="88" class="box"/><text x="800" y="420" text-anchor="middle" class="text">分类素材节点</text><text x="800" y="444" text-anchor="middle" class="text">按资源类型划分 imageNodes / videoNodes</text>
  <rect x="400" y="532" width="800" height="88" class="box"/><text x="800" y="560" text-anchor="middle" class="text">分别按位置排序</text><text x="800" y="584" text-anchor="middle" class="text">先按 y，再按 x，得到稳定编号顺序</text>
  <rect x="560" y="672" width="480" height="64" class="panel"/><text x="800" y="700" text-anchor="middle" class="text">当前节点位于图片集合还是视频集合？</text><text x="800" y="724" text-anchor="middle" class="small">计算 indexOf(nodeId)</text>
  <rect x="150" y="812" width="360" height="88" class="box"/><text x="330" y="840" text-anchor="middle" class="text">命中图片集合</text><text x="330" y="864" text-anchor="middle" class="text">返回标签：图片参考1 / 图片参考2 / ...</text>
  <rect x="620" y="812" width="360" height="88" class="box"/><text x="800" y="840" text-anchor="middle" class="text">未命中任何集合</text><text x="800" y="864" text-anchor="middle" class="text">返回 null，仅显示默认标题“素材输入”</text>
  <rect x="1090" y="812" width="360" height="88" class="box"/><text x="1270" y="840" text-anchor="middle" class="text">命中视频集合</text><text x="1270" y="864" text-anchor="middle" class="text">返回标签：视频参考1 / 视频参考2 / ...</text>
  <rect x="400" y="980" width="800" height="96" class="box"/><text x="800" y="1008" text-anchor="middle" class="text">标题栏实时展示</text><text x="800" y="1032" text-anchor="middle" class="text">在素材输入节点标题栏右侧显示编号标签；断线或重排后同步刷新</text>
  <path d="M 800 200 L 800 252" class="line"/>
  <path d="M 800 340 L 800 392" class="line"/>
  <path d="M 800 480 L 800 532" class="line"/>
  <path d="M 800 620 L 800 672" class="line"/>
  <path d="M 720 736 L 330 812" class="line"/>
  <path d="M 800 736 L 800 812" class="line"/>
  <path d="M 880 736 L 1270 812" class="line"/>
  <path d="M 330 900 L 620 980" class="line"/>
  <path d="M 800 900 L 800 980" class="line"/>
  <path d="M 1270 900 L 980 980" class="line"/>
  
</svg>