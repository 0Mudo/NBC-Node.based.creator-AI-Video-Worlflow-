<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1460" viewBox="0 0 1600 1460">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111"/>
    </marker>
    <style>
      .title { font: 700 28px 'Microsoft YaHei','SimSun',sans-serif; fill:#111; }
      .subtitle { font: 400 16px 'Microsoft YaHei','SimSun',sans-serif; fill:#444; }
      .text { font: 400 16px 'Microsoft YaHei','SimSun',sans-serif; fill:#111; }
      .small { font: 400 13px 'Microsoft YaHei','SimSun',sans-serif; fill:#222; }
      .tiny { font: 400 11px 'Microsoft YaHei','SimSun',sans-serif; fill:#333; }
      .box { fill:#fff; stroke:#111; stroke-width:2; rx:10; ry:10; }
      .group { fill:#fafafa; stroke:#111; stroke-width:2.2; rx:16; ry:16; }
      .panel { fill:#f6f6f6; stroke:#111; stroke-width:2; rx:14; ry:14; }
      .dashed { fill:#fcfcfc; stroke:#111; stroke-width:2; stroke-dasharray:8 6; rx:16; ry:16; }
      .line { stroke:#111; stroke-width:2; fill:none; marker-end:url(#arrow); }
      .plain { stroke:#111; stroke-width:2; fill:none; }
      .soft { fill:#f1f1f1; stroke:#111; stroke-width:1.6; rx:8; ry:8; }
      .chip { fill:#fff; stroke:#111; stroke-width:1.5; rx:12; ry:12; }
    </style>
  </defs>
  
  
  <text x="56" y="54" class="title">图 2  总体方法流程图</text>
  
  
  <rect x="690" y="110" width="220" height="56" class="box"/><text x="800" y="138" text-anchor="middle" class="text">开始</text>
  <rect x="590" y="210" width="420" height="88" class="box"/><text x="800" y="238" text-anchor="middle" class="text">S1：构建有向无环图</text><text x="800" y="262" text-anchor="middle" class="text">包含素材输入、角色卡、场景卡、提示词、AI 生成与输出节点</text>
  <rect x="590" y="336" width="420" height="88" class="box"/><text x="800" y="364" text-anchor="middle" class="text">S2：执行 Kahn 拓扑排序</text><text x="800" y="388" text-anchor="middle" class="text">入度计数、队列初始化、广度遍历得到可执行序列</text>
  <rect x="590" y="462" width="420" height="74" class="box"/><text x="800" y="490" text-anchor="middle" class="text">S3：遍历执行序列</text><text x="800" y="514" text-anchor="middle" class="text">按顺序取当前节点并判断节点类型</text>
  <rect x="240" y="606" width="340" height="92" class="box"/><text x="410" y="634" text-anchor="middle" class="text">非生成类节点</text><text x="410" y="658" text-anchor="middle" class="text">维持节点状态、跳过 API 调用</text><text x="410" y="680" text-anchor="middle" class="text">继续进入下一节点</text>
  <rect x="680" y="586" width="240" height="54" class="panel"/><text x="800" y="614" text-anchor="middle" class="text">当前节点类型判断</text><text x="800" y="638" text-anchor="middle" class="small">AI 生成？</text>
  <rect x="1020" y="606" width="340" height="92" class="box"/><text x="1190" y="634" text-anchor="middle" class="text">AI 生成节点</text><text x="1190" y="658" text-anchor="middle" class="text">递归收集上游上下文</text><text x="1190" y="680" text-anchor="middle" class="text">提取图像/视频/角色/场景/脚本</text>
  <rect x="1020" y="740" width="340" height="88" class="box"/><text x="1190" y="768" text-anchor="middle" class="text">S4：模板变量替换</text><text x="1190" y="792" text-anchor="middle" class="text">将 {{character}}、{{图片参考1}} 等替换为实际值</text>
  <rect x="1020" y="862" width="340" height="88" class="box"/><text x="1190" y="890" text-anchor="middle" class="text">S5：匹配适配器并调用模型</text><text x="1190" y="914" text-anchor="middle" class="text">根据节点类型调用 GPT Image / Banana / Seedance 等</text>
  <rect x="1020" y="984" width="340" height="88" class="box"/><text x="1190" y="1012" text-anchor="middle" class="text">S6：三路保存与状态更新</text><text x="1190" y="1036" text-anchor="middle" class="text">写入本地、OSS、飞书队列并更新节点执行状态</text>
  <rect x="1020" y="1106" width="340" height="88" class="box"/><text x="1190" y="1134" text-anchor="middle" class="text">S7：时间线联动</text><text x="1190" y="1158" text-anchor="middle" class="text">将生成结果自动绑定到分镜行素材池</text>
  <rect x="590" y="1230" width="420" height="80" class="box"/><text x="800" y="1258" text-anchor="middle" class="text">i++，是否仍有剩余节点？</text><text x="800" y="1282" text-anchor="middle" class="text">是：返回循环；否：结束</text>
  <rect x="690" y="1360" width="220" height="56" class="box"/><text x="800" y="1388" text-anchor="middle" class="text">结束</text>
  <path d="M 800 166 L 800 210" class="line"/>
  <path d="M 800 298 L 800 336" class="line"/>
  <path d="M 800 424 L 800 462" class="line"/>
  <path d="M 800 536 L 800 586" class="line"/>
  <path d="M 680 613 L 580 652" class="line"/>
  <path d="M 920 613 L 1020 652" class="line"/>
  <path d="M 1190 698 L 1190 740" class="line"/>
  <path d="M 1190 828 L 1190 862" class="line"/>
  <path d="M 1190 950 L 1190 984" class="line"/>
  <path d="M 1190 1072 L 1190 1106" class="line"/>
  <path d="M 1190 1194 L 1010 1255" class="line"/>
  <path d="M 580 652 L 580 1255" class="line"/>
  <path d="M 800 1310 L 800 1360" class="line"/>
  <text x="508" y="642" text-anchor="start" class="small">否</text>
  <text x="956" y="642" text-anchor="start" class="small">是</text>
  
</svg>