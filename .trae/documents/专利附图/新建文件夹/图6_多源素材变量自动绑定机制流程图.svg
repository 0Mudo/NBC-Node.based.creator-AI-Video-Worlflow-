<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1140" viewBox="0 0 1600 1140">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111"/>
    </marker>
    <style>
      .title { font: 700 28px 'Microsoft YaHei','SimSun',sans-serif; fill:#111; }
      .subtitle { font: 400 16px 'Microsoft YaHei','SimSun',sans-serif; fill:#444; }
      .text { font: 400 16px 'Microsoft YaHei','SimSun',sans-serif; fill:#111; }
      .small { font: 400 13px 'Microsoft YaHei','SimSun',sans-serif; fill:#222; }
      .tiny { font: 400 11px 'Microsoft YaHei','SimSun',sans-serif; fill:#333; }
      .box { fill:#fff; stroke:#111; stroke-width:2; rx:10; ry:10; }
      .group { fill:#fafafa; stroke:#111; stroke-width:2.2; rx:16; ry:16; }
      .panel { fill:#f6f6f6; stroke:#111; stroke-width:2; rx:14; ry:14; }
      .dashed { fill:#fcfcfc; stroke:#111; stroke-width:2; stroke-dasharray:8 6; rx:16; ry:16; }
      .line { stroke:#111; stroke-width:2; fill:none; marker-end:url(#arrow); }
      .plain { stroke:#111; stroke-width:2; fill:none; }
      .soft { fill:#f1f1f1; stroke:#111; stroke-width:1.6; rx:8; ry:8; }
      .chip { fill:#fff; stroke:#111; stroke-width:1.5; rx:12; ry:12; }
    </style>
  </defs>
  
  
  <text x="56" y="54" class="title">图 6  多源素材变量自动绑定机制流程图</text>
  
  
  <rect x="420" y="120" width="760" height="76" class="box"/><text x="800" y="148" text-anchor="middle" class="text">用户连线素材输入 → 提示词节点</text><text x="800" y="172" text-anchor="middle" class="text">提示词节点需要感知所有上游素材并自动编号</text>
  <rect x="500" y="246" width="600" height="88" class="box"/><text x="800" y="274" text-anchor="middle" class="text">PromptNode.useMemo() 触发</text><text x="800" y="298" text-anchor="middle" class="text">调用 collectMediaRefsFromUpstream()</text>
  <rect x="500" y="384" width="600" height="88" class="box"/><text x="800" y="412" text-anchor="middle" class="text">findUpstream(promptNodeId)</text><text x="800" y="436" text-anchor="middle" class="text">收集全部上游 assetInput 节点</text>
  <rect x="500" y="522" width="600" height="88" class="box"/><text x="800" y="550" text-anchor="middle" class="text">逐个读取素材记录</text><text x="800" y="574" text-anchor="middle" class="text">先从 AssetStore 查找；缺失时再按后缀判断是否为视频</text>
  <rect x="180" y="680" width="320" height="110" class="box"/><text x="340" y="708" text-anchor="middle" class="text">图像 / 视频分类</text><text x="340" y="732" text-anchor="middle" class="text">asset.type == video</text><text x="340" y="754" text-anchor="middle" class="text">或使用 isVideoRef() 后缀判断</text>
  <rect x="560" y="680" width="480" height="110" class="box"/><text x="800" y="708" text-anchor="middle" class="text">排序与编号</text><text x="800" y="732" text-anchor="middle" class="text">按节点在画布中的位置排序</text><text x="800" y="754" text-anchor="middle" class="text">得到 图片参考1..N / 视频参考1..N</text>
  <rect x="1100" y="680" width="320" height="110" class="box"/><text x="1260" y="708" text-anchor="middle" class="text">界面双向显示</text><text x="1260" y="732" text-anchor="middle" class="text">PromptNode 显示 [+图1][+视1]</text><text x="1260" y="754" text-anchor="middle" class="text">AssetInputNode 标题栏显示“图片参考1”</text>
  <rect x="500" y="860" width="600" height="96" class="box"/><text x="800" y="888" text-anchor="middle" class="text">点击标签插入变量</text><text x="800" y="912" text-anchor="middle" class="text">在提示词光标位置写入 {{图片参考1}} / {{视频参考1}}</text>
  <rect x="500" y="1020" width="600" height="96" class="box"/><text x="800" y="1048" text-anchor="middle" class="text">连线变化实时重算</text><text x="800" y="1072" text-anchor="middle" class="text">连线 / 断线后自动重新排序与刷新编号</text>
