  <path d="M 800 334 L 800 384" class="line"/>
  <path d="M 800 472 L 800 522" class="line"/>
  <path d="M 800 610 L 340 680" class="line"/>
  <path d="M 800 610 L 800 680" class="line"/>
  <path d="M 800 610 L 1260 680" class="line"/>
  <path d="M 340 790 L 620 860" class="line"/>
  <path d="M 800 790 L 800 860" class="line"/>
  <path d="M 1260 790 L 980 860" class="line"/>
  <path d="M 800 956 L 800 1020" class="line"/>
  
</svg>