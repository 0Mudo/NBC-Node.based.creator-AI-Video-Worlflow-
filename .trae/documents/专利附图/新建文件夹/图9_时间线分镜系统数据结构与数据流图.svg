<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1020" viewBox="0 0 1600 1020">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111"/>
    </marker>
    <style>
      .title { font: 700 28px 'Microsoft YaHei','SimSun',sans-serif; fill:#111; }
      .subtitle { font: 400 16px 'Microsoft YaHei','SimSun',sans-serif; fill:#444; }
      .text { font: 400 16px 'Microsoft YaHei','SimSun',sans-serif; fill:#111; }
      .small { font: 400 13px 'Microsoft YaHei','SimSun',sans-serif; fill:#222; }
      .tiny { font: 400 11px 'Microsoft YaHei','SimSun',sans-serif; fill:#333; }
      .box { fill:#fff; stroke:#111; stroke-width:2; rx:10; ry:10; }
      .group { fill:#fafafa; stroke:#111; stroke-width:2.2; rx:16; ry:16; }
      .panel { fill:#f6f6f6; stroke:#111; stroke-width:2; rx:14; ry:14; }
      .dashed { fill:#fcfcfc; stroke:#111; stroke-width:2; stroke-dasharray:8 6; rx:16; ry:16; }
      .line { stroke:#111; stroke-width:2; fill:none; marker-end:url(#arrow); }
      .plain { stroke:#111; stroke-width:2; fill:none; }
      .soft { fill:#f1f1f1; stroke:#111; stroke-width:1.6; rx:8; ry:8; }
      .chip { fill:#fff; stroke:#111; stroke-width:1.5; rx:12; ry:12; }
    </style>
  </defs>
  
  
  <text x="56" y="54" class="title">图 9  时间线分镜系统数据结构与数据流图</text>
  
  
  <rect x="80" y="150" width="1440" height="180" class="panel"/><text x="800" y="178" text-anchor="middle" class="text">TimelineRow（分镜行）</text><text x="800" y="202" text-anchor="middle" class="small">id / order / title / duration / promptText</text><text x="800" y="220" text-anchor="middle" class="small">spec: characterIds[]、sceneIds[]、itemIds[]、shotType、dialogue、action</text><text x="800" y="238" text-anchor="middle" class="small">imageBindings[] / videoBindings[] / activeImageId / activeVideoId</text>
  <rect x="80" y="420" width="1440" height="280" class="panel"/><text x="800" y="448" text-anchor="middle" class="text">Tracks（轨道）</text><text x="800" y="472" text-anchor="middle" class="small">视频轨：每个片段对应一个 TimelineRow，sourceUrl = activeVideo 或 activeImage</text><text x="800" y="490" text-anchor="middle" class="small">对白轨：对话文本转音频片段</text><text x="800" y="508" text-anchor="middle" class="small">BGM 轨：背景音乐片段</text><text x="800" y="526" text-anchor="middle" class="small">字幕轨：从 row.spec.dialogue 自动生成</text>
  <rect x="140" y="500" width="1240" height="44" class="soft"/>
  <rect x="160" y="506" width="180" height="32" class="box"/>
  <rect x="360" y="506" width="180" height="32" class="box"/>
  <rect x="560" y="506" width="180" height="32" class="box"/>
  <rect x="760" y="506" width="180" height="32" class="box"/>
  <text x="760" y="470" text-anchor="middle" class="small">视频轨</text>
  <text x="250" y="527" text-anchor="middle" class="small">片段1</text>
  <text x="450" y="527" text-anchor="middle" class="small">片段2</text>
  <text x="650" y="527" text-anchor="middle" class="small">片段3</text>
  <text x="850" y="527" text-anchor="middle" class="small">片段4</text>
  <rect x="140" y="582" width="1240" height="42" class="soft"/>
  <rect x="140" y="656" width="1240" height="42" class="soft"/>
  <text x="220" y="607" class="small">对白轨</text>
  <text x="220" y="681" class="small">字幕轨</text>
  <rect x="110" y="790" width="630" height="170" class="box"/><text x="425" y="818" text-anchor="middle" class="text">数据持久化路径</text><text x="425" y="842" text-anchor="middle" class="small">localStorage：nbc_timeline_v2_{projectId} → { rows, tracks, playheadTime }</text><text x="425" y="860" text-anchor="middle" class="small">导出：.nbc.json metadata.timeline</text><text x="425" y="878" text-anchor="middle" class="small">导入：解析 metadata.timeline → 写回 store 与 localStorage</text>
  <rect x="860" y="790" width="630" height="170" class="box"/><text x="1175" y="818" text-anchor="middle" class="text">生成结果自动填充路径</text><text x="1175" y="842" text-anchor="middle" class="small">执行引擎 commitResults → useTimelineStore.bindMediaToRow()</text><text x="1175" y="860" text-anchor="middle" class="small">按 timelineRowId 匹配目标分镜行</text><text x="1175" y="878" text-anchor="middle" class="small">写入 imageBindings / videoBindings，并自动切换 active 素材</text>
  <path d="M 800 330 L 800 420" class="line"/>
  <path d="M 800 700 L 430 790" class="line"/>
  <path d="M 800 700 L 1175 790" class="line"/>
  
</svg>