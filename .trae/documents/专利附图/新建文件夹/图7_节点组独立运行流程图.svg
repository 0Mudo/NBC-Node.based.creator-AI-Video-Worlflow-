<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1160" viewBox="0 0 1600 1160">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111"/>
    </marker>
    <style>
      .title { font: 700 28px 'Microsoft YaHei','SimSun',sans-serif; fill:#111; }
      .subtitle { font: 400 16px 'Microsoft YaHei','SimSun',sans-serif; fill:#444; }
      .text { font: 400 16px 'Microsoft YaHei','SimSun',sans-serif; fill:#111; }
      .small { font: 400 13px 'Microsoft YaHei','SimSun',sans-serif; fill:#222; }
      .tiny { font: 400 11px 'Microsoft YaHei','SimSun',sans-serif; fill:#333; }
      .box { fill:#fff; stroke:#111; stroke-width:2; rx:10; ry:10; }
      .group { fill:#fafafa; stroke:#111; stroke-width:2.2; rx:16; ry:16; }
      .panel { fill:#f6f6f6; stroke:#111; stroke-width:2; rx:14; ry:14; }
      .dashed { fill:#fcfcfc; stroke:#111; stroke-width:2; stroke-dasharray:8 6; rx:16; ry:16; }
      .line { stroke:#111; stroke-width:2; fill:none; marker-end:url(#arrow); }
      .plain { stroke:#111; stroke-width:2; fill:none; }
      .soft { fill:#f1f1f1; stroke:#111; stroke-width:1.6; rx:8; ry:8; }
      .chip { fill:#fff; stroke:#111; stroke-width:1.5; rx:12; ry:12; }
    </style>
  </defs>
  
  
  <text x="56" y="54" class="title">图 7  节点组独立运行流程图</text>
  
  
  <rect x="430" y="120" width="740" height="78" class="box"/><text x="800" y="148" text-anchor="middle" class="text">用户多选节点</text><text x="800" y="172" text-anchor="middle" class="text">Ctrl + 点击多个节点，pendingGroupNodeIds 持续累积</text>
  <rect x="520" y="248" width="560" height="88" class="box"/><text x="800" y="276" text-anchor="middle" class="text">点击“建组”按钮</text><text x="800" y="300" text-anchor="middle" class="text">addGroup(name, nodeIds) → 生成组 id、名称、节点列表、颜色</text>
  <rect x="520" y="386" width="560" height="108" class="box"/><text x="800" y="414" text-anchor="middle" class="text">GroupOverlay 渲染边框</text><text x="800" y="438" text-anchor="middle" class="text">计算包围盒 min/max</text><text x="800" y="460" text-anchor="middle" class="text">叠加 padding 与 header 高度</text><text x="800" y="482" text-anchor="middle" class="text">将逻辑坐标转换为 viewport 坐标</text>
  <rect x="520" y="544" width="560" height="88" class="box"/><text x="800" y="572" text-anchor="middle" class="text">用户点击组级“▶运行”按钮</text><text x="800" y="596" text-anchor="middle" class="text">仅针对组内节点发起执行</text>
  <rect x="430" y="682" width="740" height="116" class="box"/><text x="800" y="710" text-anchor="middle" class="text">executeNodes(group.nodeIds)</text><text x="800" y="734" text-anchor="middle" class="text">取全图 nodes + edges</text><text x="800" y="756" text-anchor="middle" class="text">构造 nodeIdSet</text><text x="800" y="778" text-anchor="middle" class="text">先 topoSort，再 filter 仅保留组内节点</text>
  <rect x="430" y="848" width="740" height="104" class="box"/><text x="800" y="876" text-anchor="middle" class="text">仅执行过滤后的 AI 生成节点</text><text x="800" y="900" text-anchor="middle" class="text">复用执行引擎上下文收集、模板替换、模型调用与保存逻辑</text>
  <rect x="430" y="1002" width="740" height="96" class="box"/><text x="800" y="1030" text-anchor="middle" class="text">持久化保存</text><text x="800" y="1054" text-anchor="middle" class="text">debouncedAutoSave() → saveCurrentData(nodes, edges, groups)</text><text x="800" y="1076" text-anchor="middle" class="text">写入 localStorage 并支持 .nbc.json 导出</text>
  <path d="M 800 198 L 800 248" class="line"/>
  <path d="M 800 336 L 800 386" class="line"/>
  <path d="M 800 494 L 800 544" class="line"/>
  <path d="M 800 632 L 800 682" class="line"/>
  <path d="M 800 798 L 800 848" class="line"/>
  <path d="M 800 952 L 800 1002" class="line"/>
  
</svg>