<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>图2 方法总体流程图</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #ffffff;
      color: #0f172a;
      font-family: "Microsoft YaHei", Arial, sans-serif;
    }
    .page {
      width: 1600px;
      min-height: 900px;
      padding: 28px 32px 24px;
      background: #ffffff;
    }
    .title {
      text-align: center;
      font-size: 34px;
      font-weight: 800;
      margin: 0;
      letter-spacing: 0.5px;
    }
    .subtitle {
      text-align: center;
      font-size: 18px;
      color: #475569;
      margin: 8px 0 16px;
    }
    svg { width: 100%; height: 780px; display: block; }
  </style>
</head>
<body>
  <div class="page">
    <h1 class="title">图2 方法总体流程图</h1>
    <div class="subtitle">从图构建到结果保存和时间线联动的完整执行流程</div>
    <svg viewBox="0 0 1600 980" width="1600" height="780" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569" />
        </marker>
      </defs>
      
      
    <rect x="660" y="50" width="280" height="58" rx="29" fill="#dbeafe" stroke="#2563eb" stroke-width="3"  />
    <text text-anchor="middle" font-size="26" font-weight="600" fill="#0f172a" font-family="Microsoft YaHei, Arial"><tspan x="800" y="79">开始</tspan></text>
  
      
    <rect x="585" y="145" width="430" height="78" rx="18" fill="#eff6ff" stroke="#3b82f6" stroke-width="3"  />
    <text text-anchor="middle" font-size="24" font-weight="600" fill="#0f172a" font-family="Microsoft YaHei, Arial"><tspan x="800" y="167.8">S1 构建工作流有向无环图</tspan><tspan x="800" y="200.20000000000002">节点：素材 / 角色 / 场景 / 提示词 / 生成 / 输出</tspan></text>
  
      
    <rect x="585" y="270" width="430" height="78" rx="18" fill="#f8fafc" stroke="#64748b" stroke-width="3"  />
    <text text-anchor="middle" font-size="24" font-weight="600" fill="#0f172a" font-family="Microsoft YaHei, Arial"><tspan x="800" y="292.8">S2 拓扑排序</tspan><tspan x="800" y="325.20000000000005">采用 Kahn 算法生成执行序列</tspan></text>
  
      
    <rect x="585" y="395" width="430" height="78" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="3"  />
    <text text-anchor="middle" font-size="24" font-weight="600" fill="#0f172a" font-family="Microsoft YaHei, Arial"><tspan x="800" y="417.8">S3 收集上游节点并构建执行上下文</tspan><tspan x="800" y="450.20000000000005">提取素材、角色、场景、剧本、提示词数据</tspan></text>
  
      
    <rect x="585" y="520" width="430" height="78" rx="18" fill="#fef3c7" stroke="#d97706" stroke-width="3"  />
    <text text-anchor="middle" font-size="24" font-weight="600" fill="#0f172a" font-family="Microsoft YaHei, Arial"><tspan x="800" y="542.8">S4 模板变量替换</tspan><tspan x="800" y="575.1999999999999">character / scene / 图片参考N / 视频参考N</tspan></text>
  
      
    <rect x="585" y="645" width="430" height="78" rx="18" fill="#ede9fe" stroke="#7c3aed" stroke-width="3"  />
    <text text-anchor="middle" font-size="24" font-weight="600" fill="#0f172a" font-family="Microsoft YaHei, Arial"><tspan x="800" y="667.8">S5 调用生成器适配器执行 AI 生成</tspan><tspan x="800" y="700.1999999999999">匹配 GPT 图像 / 视频 / ComfyUI 等能力</tspan></text>
  
      
    <rect x="150" y="645" width="320" height="78" rx="18" fill="#fee2e2" stroke="#dc2626" stroke-width="3"  />
    <text text-anchor="middle" font-size="24" font-weight="600" fill="#0f172a" font-family="Microsoft YaHei, Arial"><tspan x="310" y="667.8">节点组独立运行</tspan><tspan x="310" y="700.1999999999999">按选中节点过滤后构建子图</tspan></text>
  
      
    <rect x="1110" y="645" width="340" height="78" rx="18" fill="#cffafe" stroke="#0891b2" stroke-width="3"  />
    <text text-anchor="middle" font-size="24" font-weight="600" fill="#0f172a" font-family="Microsoft YaHei, Arial"><tspan x="1280" y="667.8">前端实时素材标签</tspan><tspan x="1280" y="700.1999999999999">同步显示 图片参考N / 视频参考N</tspan></text>
  
      
    <rect x="585" y="770" width="430" height="78" rx="18" fill="#ecfccb" stroke="#65a30d" stroke-width="3"  />
    <text text-anchor="middle" font-size="24" font-weight="600" fill="#0f172a" font-family="Microsoft YaHei, Arial"><tspan x="800" y="792.8">S6 三路保存 + S7 时间线联动</tspan><tspan x="800" y="825.1999999999999">写入本地 / OSS / 飞书，并自动填充分镜槽位</tspan></text>
  
      
    <rect x="660" y="870" width="280" height="58" rx="29" fill="#dbeafe" stroke="#2563eb" stroke-width="3"  />
    <text text-anchor="middle" font-size="26" font-weight="600" fill="#0f172a" font-family="Microsoft YaHei, Arial"><tspan x="800" y="899">结束</tspan></text>
  
      <line x1="800" y1="108" x2="800" y2="145" stroke="#475569" stroke-width="3"   marker-end="url(#arrow)" />
      <line x1="800" y1="223" x2="800" y2="270" stroke="#475569" stroke-width="3"   marker-end="url(#arrow)" />
      <line x1="800" y1="348" x2="800" y2="395" stroke="#475569" stroke-width="3"   marker-end="url(#arrow)" />
      <line x1="800" y1="473" x2="800" y2="520" stroke="#475569" stroke-width="3"   marker-end="url(#arrow)" />
      <line x1="800" y1="598" x2="800" y2="645" stroke="#475569" stroke-width="3"   marker-end="url(#arrow)" />
      <line x1="800" y1="723" x2="800" y2="770" stroke="#475569" stroke-width="3"   marker-end="url(#arrow)" />
      <line x1="800" y1="848" x2="800" y2="870" stroke="#475569" stroke-width="3"   marker-end="url(#arrow)" />
      <polyline points="470,684 528,684 528,684 585,684" fill="none" stroke="#475569" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrow)" />
      <polyline points="1015,684 1062,684 1062,684 1110,684" fill="none" stroke="#475569" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrow)" />
    
    </svg>
  </div>
</body>
</html>
