<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>图14 三路保存协调器的数据流图</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #ffffff;
      color: #0f172a;
      font-family: "Microsoft YaHei", Arial, sans-serif;
    }
    .page {
      width: 1600px;
      min-height: 900px;
      padding: 28px 32px 24px;
      background: #ffffff;
    }
    .title {
      text-align: center;
      font-size: 34px;
      font-weight: 800;
      margin: 0;
      letter-spacing: 0.5px;
    }
    .subtitle {
      text-align: center;
      font-size: 18px;
      color: #475569;
      margin: 8px 0 16px;
    }
    svg { width: 100%; height: 780px; display: block; }
  </style>
</head>
<body>
  <div class="page">
    <h1 class="title">图14 三路保存协调器的数据流图</h1>
    <div class="subtitle">生成结果在本地、云端和协作平台间的协调保存过程</div>
    <svg viewBox="0 0 1600 980" width="1600" height="780" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569" />
        </marker>
      </defs>
      
      
    <rect x="620" y="80" width="360" height="60" rx="30" fill="#dbeafe" stroke="#2563eb" stroke-width="3"  />
    <text text-anchor="middle" font-size="22" font-weight="600" fill="#0f172a" font-family="Microsoft YaHei, Arial"><tspan x="800" y="110">生成结果 Result Asset</tspan></text>
  
      <line x1="800" y1="140" x2="800" y2="220" stroke="#475569" stroke-width="3"   marker-end="url(#arrow)" />
      
    <rect x="540" y="220" width="520" height="92" rx="18" fill="#eff6ff" stroke="#3b82f6" stroke-width="3"  />
    <text text-anchor="middle" font-size="24" font-weight="600" fill="#0f172a" font-family="Microsoft YaHei, Arial"><tspan x="800" y="249.8">saveManager / resultPipeline</tspan><tspan x="800" y="282.20000000000005">统一协调保存策略、命名规则、状态回传</tspan></text>
  
      <line x1="800" y1="312" x2="800" y2="380" stroke="#475569" stroke-width="3"   marker-end="url(#arrow)" />
      
    <rect x="160" y="380" width="300" height="120" rx="18" fill="#ecfccb" stroke="#65a30d" stroke-width="3"  />
    <text text-anchor="middle" font-size="24" font-weight="600" fill="#0f172a" font-family="Microsoft YaHei, Arial"><tspan x="310" y="407.6">本地文件系统通道</tspan><tspan x="310" y="440">save:local</tspan><tspan x="310" y="472.40000000000003">文档\NBC素材</tspan></text>
  
      
    <rect x="650" y="380" width="300" height="120" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="3"  />
    <text text-anchor="middle" font-size="24" font-weight="600" fill="#0f172a" font-family="Microsoft YaHei, Arial"><tspan x="800" y="407.6">对象存储服务通道</tspan><tspan x="800" y="440">save:oss</tspan><tspan x="800" y="472.40000000000003">staging / manifest</tspan></text>
  
      
    <rect x="1140" y="380" width="300" height="120" rx="18" fill="#fef3c7" stroke="#d97706" stroke-width="3"  />
    <text text-anchor="middle" font-size="24" font-weight="600" fill="#0f172a" font-family="Microsoft YaHei, Arial"><tspan x="1290" y="407.6">协作平台队列通道</tspan><tspan x="1290" y="440">save:feishu</tspan><tspan x="1290" y="472.40000000000003">JSONL 同步队列</tspan></text>
  
      <line x1="800" y1="380" x2="310" y2="380" stroke="#475569" stroke-width="3"   marker-end="url(#arrow)" />
      <line x1="800" y1="380" x2="650" y2="380" stroke="#475569" stroke-width="3"   marker-end="url(#arrow)" />
      <line x1="950" y1="380" x2="1140" y2="380" stroke="#475569" stroke-width="3"   marker-end="url(#arrow)" />
      
    <rect x="160" y="590" width="300" height="90" rx="18" fill="#f8fafc" stroke="#64748b" stroke-width="3"  />
    <text text-anchor="middle" font-size="24" font-weight="600" fill="#0f172a" font-family="Microsoft YaHei, Arial"><tspan x="310" y="618.8">返回本地路径</tspan><tspan x="310" y="651.1999999999999">供界面展示和时间线绑定</tspan></text>
  
      
    <rect x="650" y="590" width="300" height="90" rx="18" fill="#f8fafc" stroke="#64748b" stroke-width="3"  />
    <text text-anchor="middle" font-size="24" font-weight="600" fill="#0f172a" font-family="Microsoft YaHei, Arial"><tspan x="800" y="618.8">返回 URL / objectKey</tspan><tspan x="800" y="651.1999999999999">供素材库与分享使用</tspan></text>
  
      
    <rect x="1140" y="590" width="300" height="90" rx="18" fill="#f8fafc" stroke="#64748b" stroke-width="3"  />
    <text text-anchor="middle" font-size="24" font-weight="600" fill="#0f172a" font-family="Microsoft YaHei, Arial"><tspan x="1290" y="618.8">供外部 Agent 定时消费</tspan><tspan x="1290" y="651.1999999999999">异步同步到飞书</tspan></text>
  
      <line x1="310" y1="500" x2="310" y2="590" stroke="#475569" stroke-width="3"   marker-end="url(#arrow)" />
      <line x1="800" y1="500" x2="800" y2="590" stroke="#475569" stroke-width="3"   marker-end="url(#arrow)" />
      <line x1="1290" y1="500" x2="1290" y2="590" stroke="#475569" stroke-width="3"   marker-end="url(#arrow)" />
    
    </svg>
  </div>
</body>
</html>
