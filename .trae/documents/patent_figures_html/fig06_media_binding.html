    <rect x="230" y="370" width="180" height="90" rx="18" fill="#ede9fe" stroke="#7c3aed" stroke-width="3"  />

        <text x="120" y="520" fill="#334155" font-size="24" font-weight="500" text-anchor="start" font-family="Microsoft YaHei, Arial">1. 读取 asset.type 精确判断图片/视频</text>

      <line x1="580" y1="380" x2="640" y2="380" stroke="#475569" stroke-width="3"   marker-end="url(#arrow)" />
